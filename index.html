<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Informacije</title>
</head>
<body>
<h1>GPS Informacije</h1>
<p> Kuca dolje</p>
<p> Y= 592672,48</p>
<p> x= 5022103,32</p>
<p> x= 153,45</p>

<p id="coordinates"></p>
<p id="altitude"></p>
<p id="accuracy"></p>

<script>
    var coordinatesPara = document.getElementById("coordinates");
    var altitudePara = document.getElementById("altitude");
    var accuracyPara = document.getElementById("accuracy");

    function showPosition(position) {
        var latitude = position.coords.latitude;
        var longitude = position.coords.longitude;
        var altitude = position.coords.altitude;
        var accuracy = position.coords.accuracy;

    // Example usage:
    let fi = latitude;
    let al = longitude;
    let result = fila_yx(fi, al);
  
    coordinatesPara.innerHTML = "Y =   " + result.y.toFixed(2) + "<br>X =  " + result.x.toFixed(2);
        altitudePara.innerHTML = "Altitude: " + altitude + " meters";
        accuracyPara.innerHTML = "Accuracy: " + accuracy + " meters";
    }

    function showError(error) {
        switch(error.code) {
            case error.PERMISSION_DENIED:
                coordinatesPara.innerHTML = "Korisnik je odbio zahtjev za geolokacijom.";
                break;
            case error.POSITION_UNAVAILABLE:
                coordinatesPara.innerHTML = "Informacije o lokaciji nisu dostupne.";
                break;
            case error.TIMEOUT:
                coordinatesPara.innerHTML = "Vrijeme isteka zahtjeva za lokacijom.";
                break;
            case error.UNKNOWN_ERROR:
                coordinatesPara.innerHTML = "Nepoznata gre�ka.";
                break;
        }
    }

    function getLocation() {
        var options = {
            enableHighAccuracy: true
        };
        
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(showPosition, showError, options);
        } else {
            coordinatesPara.innerHTML = "Geolokacija nije podr�ana u va�em pregledniku.";
        }
    }

    function Pow(Baza, Exponent) {
  let pred, b, ek;
  pred = 1;
  b = Baza;
  ek = Exponent;
  if (b < 0) {
    if (ek === parseInt(ek)) {
      b = Math.abs(b);
      pred = ek / 2 === parseInt(ek / 2) ? 1 : -1;
    }
  }
  if (b !== 0) {
    return pred * Math.exp(Math.log(b) * ek);
  } else {
    return 0;
  }
}

function Rad(x) {
    return x * Math.PI / 180;
}


function tan(x) {
    return Math.sin(x) / Math.cos(x);
}

function fila_yx(fi, al) {
    let a, b, om, e, ec, ao, bo, co, d0, alo, yk, bx, el, en, t, eta, yf1, yf2, yf3, xf1, xf2, xp, yp, c1, c2;
    a = 6378137.000;
    b = 6356752.31414;
    om = 0.9999;
    e = Math.sqrt((Math.pow(a, 2) - Math.pow(b, 2)) / Math.pow(a, 2));
    ec = Math.sqrt((Math.pow(a, 2) - Math.pow(b, 2)) / Math.pow(b, 2));
    ao = 1 + 3 * Math.pow(e, 2) / 4 + 45 * Pow(e, 4) / 64 + 175 * Pow(e, 6) / 256 + 11025 * Pow(e, 8) / 16484;
    bo = 3 * Math.pow(e, 2) / 4 + 15 * Pow(e, 4) / 16 + 525 * Pow(e, 6) / 512 + 2205 * Pow(e, 8) / 2048;
    co = 15 * Pow(e, 4) / 64 + 105 * Pow(e, 6) / 256 + 2205 * Pow(e, 8) / 4096;
    d0 = 35 * Pow(e, 6) / 512 + 315 * Pow(e, 8) / 2048;
    fi = Rad(fi);
    al = Rad(al);
    alo = Rad(16.5);
    yk = 500000;
    el = al - alo;
    bx = a * (1 - Math.pow(e, 2)) * (ao * fi - bo * Math.sin(2 * fi) / 2 + co * Math.sin(4 * fi) / 4 - d0 * Math.sin(6 * fi) / 6);
    en = a / Math.sqrt(1 - Math.pow(e, 2) * Math.pow(Math.sin(fi), 2));
    t = Math.tan(fi);
    eta = ec * Math.cos(fi);
    yf1 = en * Math.cos(fi);
    yf2 = en * Math.pow(Math.cos(fi), 3) * (1 - Math.pow(t, 2) + Math.pow(eta, 2)) / 6;
    yf3 = en * Math.pow(Math.cos(fi), 5) * (5 - 18 * Math.pow(t, 2) + Math.pow(t, 4) + 14 * Math.pow(eta, 2) - 58 * Math.pow(t, 2) * Math.pow(eta, 2)) / 120;
    xf1 = en * Math.sin(fi) * Math.cos(fi) / 2;
    xf2 = en * Math.sin(fi) * Math.pow(Math.cos(fi), 3) * (5 - Math.pow(t, 2) + 9 * Math.pow(eta, 2) + 4 * Math.pow(eta, 4)) / 24;
    xp = bx + xf1 * Math.pow(el, 2) + xf2 * Math.pow(el, 4);
    yp = yf1 * el + yf2 * Math.pow(el, 3) + yf3 * Math.pow(el, 5);
    let x = om * xp;
    let y = om * yp + yk;
    return { y, x };
}



getLocation();
</script>
</body>
</html>
